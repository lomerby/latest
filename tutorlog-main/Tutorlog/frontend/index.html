<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorLog - Online Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="logo">
                <h1>🎓 TutorLog</h1>
                <p>Online Learning for Nigerian Students</p>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-section active">
                <h2>Login to Your Account</h2>
                <form onsubmit="handleLogin(event)">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p>Don't have an account? <a href="#" onclick="toggleForms()">Register here</a></p>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="form-section">
                <h2>Create Your Account</h2>
                <form onsubmit="handleRegister(event)">
                    <input type="text" id="fullName" placeholder="Full Name" required>
                    <input type="email" id="registerEmail" placeholder="Email" required>
                    <input type="password" id="registerPassword" placeholder="Password (min 6 characters)" required minlength="6">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                    <button type="submit">Register</button>
                </form>
                <p>Already have an account? <a href="#" onclick="toggleForms()">Login here</a></p>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
